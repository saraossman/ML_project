name: ml_project
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  # scientific / data stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - joblib
  - pyarrow
  # plotting
  - matplotlib
  - seaborn
  # gradient boosting
  - xgboost
  - lightgbm
  # pip-only packages (NLP / deep learning)
  - pip:
      - torch
      - transformers
      - sentence-transformers
      - langdetect
      - vadersentiment
